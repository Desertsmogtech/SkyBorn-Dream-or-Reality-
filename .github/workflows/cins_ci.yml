name: CINS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run CINS Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest CINS/tests/test_orchestrator.py \
                 CINS/tests/test_resource_arbitration.py \
                 CINS/tests/test_safety_envelope.py \
                 CINS/tests/test_timing_model.py \
                 -v --tb=short

      - name: Run stress tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest CINS/tests/stress/ \
                 -v --tb=short

      - name: Full suite with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest CINS/tests/ \
                 --cov=CINS \
                 --cov-report=term-missing \
                 --tb=short \
                 -v
